server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Allow uploads up to 210 MB (covers our 200 MB app-level limit)
    client_max_body_size 210m;

    # Allow client body upload time before closing the connection
    client_body_timeout 300s;
    keepalive_timeout  300s;
    send_timeout       300s;

    # Proxy all /api/* requests to the backend service
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Stream the request body directly to the backend — do NOT buffer
        # the upload in nginx temp files. Without this, nginx must store the
        # entire file before forwarding, which causes connection resets on
        # large uploads and contributes to "Network Error" in the browser.
        proxy_request_buffering off;

        # Required for SSE (AI streaming) — also prevents response buffering
        proxy_buffering off;
        proxy_cache off;

        # Timeouts for large uploads and long-running transcriptions
        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
        proxy_connect_timeout  60s;
    }

    # React router — fall back to index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
