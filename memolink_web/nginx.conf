server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Allow uploads up to 210 MB (covers our 200 MB app-level limit)
    client_max_body_size 210m;

    # Proxy all /api/* requests to the backend service
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Required for SSE (AI streaming)
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        # Allow enough time for large file uploads and long transcriptions
        proxy_send_timeout 300s;
        proxy_connect_timeout 60s;
    }

    # React router — fall back to index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
