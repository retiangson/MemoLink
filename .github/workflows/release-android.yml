name: Release Android App

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: memolink_web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: memolink_web

      - name: Build web assets
        run: npm run build
        working-directory: memolink_web
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Sync Capacitor Android project
        run: npx cap sync android
        working-directory: memolink_web

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build debug APK
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug
        working-directory: memolink_web/android

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload APK to S3
        run: |
          aws s3 cp android/app/build/outputs/apk/debug/app-debug.apk s3://${{ secrets.S3_UPLOAD_BUCKET }}/downloads/MemoLink.apk
        working-directory: memolink_web
