name: Release Desktop App

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-tags: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: memolink_web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: memolink_web

      - name: Build renderer + Electron main
        run: node scripts/build-electron.mjs
        working-directory: memolink_web
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_DESKTOP_DOWNLOAD_URL: https://${{ secrets.S3_UPLOAD_BUCKET }}.s3.${{ secrets.AWS_REGION }}.amazonaws.com/downloads/MemoLink-Setup.exe

      - name: Bundle Node.js binary for offline bridge
        run: |
          New-Item -ItemType Directory -Force -Path extraResources
          $nodePath = node -e "process.stdout.write(process.execPath)"
          Write-Host "Bundling Node.js from: $nodePath"
          Copy-Item $nodePath "extraResources/node.exe"
        working-directory: memolink_web
        shell: pwsh

      - name: Package installer
        run: npx electron-builder --win --publish never
        working-directory: memolink_web

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload installer to S3
        run: |
          aws s3 cp release/MemoLink-Setup.exe s3://${{ secrets.S3_UPLOAD_BUCKET }}/downloads/MemoLink-Setup.exe
        working-directory: memolink_web
        shell: pwsh
