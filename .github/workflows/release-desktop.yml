name: Release Desktop App

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-tags: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: memolink_web/package-lock.json

      - name: Check version and create git tag
        id: version
        run: |
          $ver = (Get-Content package.json | ConvertFrom-Json).version
          echo "value=$ver" >> $env:GITHUB_OUTPUT
          $tagExists = git ls-remote --tags origin "refs/tags/v$ver"
          if ($tagExists) {
            echo "released=true" >> $env:GITHUB_OUTPUT
            Write-Host "Version v$ver already released — skipping build."
          } else {
            echo "released=false" >> $env:GITHUB_OUTPUT
            Write-Host "New version v$ver — tagging commit and building release."
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "v$ver"
            git push origin "v$ver"
          }
        working-directory: memolink_web
        shell: pwsh

      - name: Install dependencies
        if: steps.version.outputs.released == 'false'
        run: npm ci
        working-directory: memolink_web

      - name: Build renderer + Electron main
        if: steps.version.outputs.released == 'false'
        run: node scripts/build-electron.mjs
        working-directory: memolink_web
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Package and publish to GitHub Releases
        if: steps.version.outputs.released == 'false'
        run: npx electron-builder --win --publish always
        working-directory: memolink_web
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
