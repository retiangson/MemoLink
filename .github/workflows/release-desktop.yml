name: Release Desktop App

on:
  push:
    tags:
      - "v*.*.*"
      - "[0-9]*.[0-9]*.[0-9]*"
  workflow_dispatch:

permissions:
  contents: write  # needed to create GitHub Releases and upload assets

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: memolink_web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: memolink_web

      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          npm version $version --no-git-tag-version --allow-same-version
        working-directory: memolink_web
        shell: pwsh

      - name: Build renderer + Electron main
        run: node scripts/build-electron.mjs
        working-directory: memolink_web
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Package and publish to GitHub Releases
        run: npx electron-builder --win --publish always
        working-directory: memolink_web
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
