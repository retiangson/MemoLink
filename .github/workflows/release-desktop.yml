name: Release Desktop App

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-tags: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: memolink_web/package-lock.json

      - name: Delete existing release and retag v1.0.0
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          gh release delete v1.0.0 --yes --cleanup-tag 2>$null
          git tag -f v1.0.0
          git push origin v1.0.0 --force
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh

      - name: Install dependencies
        run: npm ci
        working-directory: memolink_web

      - name: Build renderer + Electron main
        run: node scripts/build-electron.mjs
        working-directory: memolink_web
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Package and publish to GitHub Releases
        run: npx electron-builder --win --publish always
        working-directory: memolink_web
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
