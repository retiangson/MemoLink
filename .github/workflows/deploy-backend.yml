name: Deploy Backend to AWS Lambda

on:
  push:
    branches: [main]

env:
  ECR_REPOSITORY: memolink-backend

jobs:
  test:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest --tb=short -q

  deploy:
    name: Build & Deploy to Lambda
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image to ECR
        id: build
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI=$REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG
          echo "Pushing to: $IMAGE_URI"
          docker build -t $IMAGE_URI .
          docker push $IMAGE_URI
          echo "image_uri=$IMAGE_URI" >> $GITHUB_OUTPUT

      - name: Update Lambda function image
        run: |
          aws lambda update-function-code \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }} \
            --image-uri ${{ steps.build.outputs.image_uri }}

      - name: Wait for Lambda update to complete
        run: |
          aws lambda wait function-updated \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }}

      - name: Sync environment variables to Lambda
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_CHAT_MODEL: ${{ secrets.OPENAI_CHAT_MODEL }}
          OPENAI_EMBEDDING_MODEL: ${{ secrets.OPENAI_EMBEDDING_MODEL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPGRAM_API_KEY: ${{ secrets.DEEPGRAM_API_KEY }}
          BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_API_KEY }}
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          S3_UPLOAD_BUCKET: ${{ secrets.S3_UPLOAD_BUCKET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REDIRECT_URI: ${{ secrets.GOOGLE_REDIRECT_URI }}
          FERNET_KEY: ${{ secrets.FERNET_KEY }}
          TEAMS_CLIENT_ID: ${{ secrets.TEAMS_CLIENT_ID }}
          TEAMS_CLIENT_SECRET: ${{ secrets.TEAMS_CLIENT_SECRET }}
          TEAMS_TENANT_ID: ${{ secrets.TEAMS_TENANT_ID }}
          TEAMS_REDIRECT_URI: ${{ secrets.TEAMS_REDIRECT_URI }}
        run: |
          # Build Variables JSON via Python to safely handle special characters in secret values
          ENV_JSON=$(python3 -c "
          import json, os
          vars = {
            'DATABASE_URL': os.environ['DATABASE_URL'],
            'OPENAI_API_KEY': os.environ['OPENAI_API_KEY'],
            'OPENAI_CHAT_MODEL': os.environ.get('OPENAI_CHAT_MODEL', ''),
            'OPENAI_EMBEDDING_MODEL': os.environ.get('OPENAI_EMBEDDING_MODEL', ''),
            'GEMINI_API_KEY': os.environ.get('GEMINI_API_KEY', ''),
            'DEEPSEEK_API_KEY': os.environ.get('DEEPSEEK_API_KEY', ''),
            'DEEPGRAM_API_KEY': os.environ.get('DEEPGRAM_API_KEY', ''),
            'BRAVE_SEARCH_API_KEY': os.environ.get('BRAVE_SEARCH_API_KEY', ''),
            'SEMANTIC_SCHOLAR_API_KEY': os.environ.get('SEMANTIC_SCHOLAR_API_KEY', ''),
            'JWT_SECRET_KEY': os.environ['JWT_SECRET_KEY'],
            'JWT_ALGORITHM': 'HS256',
            'SMTP_HOST': os.environ.get('SMTP_HOST', ''),
            'SMTP_PORT': os.environ.get('SMTP_PORT', '587'),
            'SMTP_USER': os.environ.get('SMTP_USER', ''),
            'SMTP_PASSWORD': os.environ.get('SMTP_PASSWORD', ''),
            'SMTP_FROM': os.environ.get('SMTP_FROM', ''),
            'FRONTEND_URL': os.environ.get('FRONTEND_URL', ''),
            'S3_UPLOAD_BUCKET': os.environ.get('S3_UPLOAD_BUCKET', ''),
            'GOOGLE_CLIENT_ID': os.environ.get('GOOGLE_CLIENT_ID', ''),
            'GOOGLE_CLIENT_SECRET': os.environ.get('GOOGLE_CLIENT_SECRET', ''),
            'GOOGLE_REDIRECT_URI': os.environ.get('GOOGLE_REDIRECT_URI', ''),
            'FERNET_KEY': os.environ.get('FERNET_KEY', ''),
            'TEAMS_CLIENT_ID': os.environ.get('TEAMS_CLIENT_ID', ''),
            'TEAMS_CLIENT_SECRET': os.environ.get('TEAMS_CLIENT_SECRET', ''),
            'TEAMS_TENANT_ID': os.environ.get('TEAMS_TENANT_ID', ''),
            'TEAMS_REDIRECT_URI': os.environ.get('TEAMS_REDIRECT_URI', ''),
            'MEMOLINK_SKIP_DB_BOOTSTRAP': '1',
          }
          print(json.dumps({'Variables': vars}))
          ")
          aws lambda update-function-configuration \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }} \
            --environment "$ENV_JSON"

      - name: Wait for configuration update to complete
        run: |
          aws lambda wait function-updated \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }}

      - name: Set Lambda timeout and memory
        run: |
          aws lambda update-function-configuration \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }} \
            --timeout 300 \
            --memory-size 512

      - name: Print deployed image
        run: echo "Deployed ${{ steps.build.outputs.image_uri }} to Lambda"
