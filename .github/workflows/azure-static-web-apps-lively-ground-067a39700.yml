name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  # pull_request:                                   # staging deploys disabled — hits Azure SWA env limit
  #   types: [opened, synchronize, reopened, closed]
  #   branches:
  #     - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    permissions:
       id-token: write
       contents: read
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false
      - name: Install OIDC Client from Core Package
        run: npm install @actions/core@1.6.0 @actions/http-client
      - name: Get Id Token
        uses: actions/github-script@v6
        id: idtoken
        with:
           script: |
               const coredemo = require('@actions/core')
               return await coredemo.getIDToken()
           result-encoding: string
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_DESKTOP_DOWNLOAD_URL: https://${{ secrets.S3_UPLOAD_BUCKET }}.s3.${{ secrets.AWS_REGION }}.amazonaws.com/downloads/MemoLink-Setup.exe
          VITE_ANDROID_DOWNLOAD_URL: https://${{ secrets.S3_UPLOAD_BUCKET }}.s3.${{ secrets.AWS_REGION }}.amazonaws.com/downloads/MemoLink.apk
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_LIVELY_GROUND_067A39700 }}
          action: "upload"
          app_location: "./memolink_web"
          api_location: ""
          output_location: "dist"
          github_id_token: ${{ steps.idtoken.outputs.result }}

  # close_pull_request_job:                         # staging deploys disabled
  #   if: github.event_name == 'pull_request' && github.event.action == 'closed'
